<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square background (app icon) — navy -->
  <rect width="100" height="100" rx="22" fill="#0A2342"/>
  
  <!-- Compass outer ring — white -->
  <circle cx="50" cy="50" r="36" stroke="#FFFFFF" stroke-width="3" fill="none"/>
  
  <!-- Cardinal ticks (N/S/E/W) — longer, white -->
  <!-- North -->
  <line x1="50" y1="14" x2="50" y2="10" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round"/>
  <!-- South -->
  <line x1="50" y1="86" x2="50" y2="90" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round"/>
  <!-- East -->
  <line x1="86" y1="50" x2="90" y2="50" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round"/>
  <!-- West -->
  <line x1="14" y1="50" x2="10" y2="50" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round"/>
  
  <!-- Diagonal ticks (NE/SE/SW/NW) — shorter, white -->
  <!-- NE 45deg -->
  <line x1="75.5" y1="24.5" x2="78" y2="22" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- SE 135deg -->
  <line x1="75.5" y1="75.5" x2="78" y2="78" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- SW 225deg -->
  <line x1="24.5" y1="75.5" x2="22" y2="78" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  <!-- NW 315deg -->
  <line x1="24.5" y1="24.5" x2="22" y2="22" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round"/>
  
  <!-- "A" letterform — white -->
  <!-- Left leg: peak (50,17) to left foot (34,55) -->
  <line x1="50" y1="17" x2="34" y2="55" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right leg: peak (50,17) to right foot (66,55) -->
  <line x1="50" y1="17" x2="66" y2="55" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="39.5" y1="42" x2="60.5" y2="42" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
</svg>
